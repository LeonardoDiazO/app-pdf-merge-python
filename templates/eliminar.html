<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Páginas PDF - PDF Tools</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .page-preview {
      position: relative;
      border: 2px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all var(--transition-normal);
      cursor: pointer;
      background: white;
    }

    .page-preview:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .page-preview:focus-visible { outline: 2px solid var(--pdf-red); outline-offset: 2px; }

    .page-preview.selected {
      border-color: var(--pdf-red);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
    }

    .page-preview canvas { width: 100%; height: auto; display: block; }

    .page-checkbox {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      width: 24px;
      height: 24px;
      cursor: pointer;
      z-index: 10;
    }

    .page-number {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .delete-button {
      background: var(--pdf-red);
      color: white;
      border: none;
      padding: 1.25rem 4rem;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-lg);
      text-transform: uppercase;
    }

    .delete-button:hover { background: #b91c1c; box-shadow: var(--shadow-xl); transform: translateY(-2px); }
    .delete-button:disabled { background: var(--text-secondary); cursor: not-allowed; opacity: 0.5; }

    .instructions {
      background: var(--pdf-red-light);
      border-left: 4px solid var(--pdf-red);
      padding: 1rem 1.5rem;
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
      color: var(--text-secondary);
    }

    .select-all-btn {
      background: var(--pdf-red);
      color: white;
      border: none;
      padding: 0.5rem 1.5rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 600;
      transition: all var(--transition-fast);
      margin-bottom: 1rem;
    }

    .select-all-btn:hover { background: #b91c1c; }
  </style>
</head>

<body>
  <header class="app-header">
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/flask-logo.svg') }}" alt="Flask" class="logo-icon">
      <img src="{{ url_for('static', filename='images/python-logo.svg') }}" alt="Python" class="logo-icon">
    </div>
  </header>

  <main class="main-container">
    <a href="/" class="back-link">← Volver al inicio</a>
    <h1 class="page-title">🗑️ Eliminar Páginas PDF</h1>

    <div class="instructions">
      📌 Sube un archivo PDF y selecciona las páginas que deseas eliminar.
      Las páginas marcadas serán removidas del documento final.
    </div>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">Click para seleccionar un archivo PDF</div>
      <div class="drop-zone-subtext">O arrastra y suelta aquí</div>
      <div class="drop-zone-steps">
        <span>1. Sube</span><span> → </span><span>2. Selecciona páginas</span><span> → </span><span>3. Descarga</span>
      </div>
    </div>

    <input type="file" id="fileInput" class="file-input-hidden" accept="application/pdf">

    <div id="pageControlsSection" style="display: none;">
      <div style="text-align: center; margin: 1rem 0;">
        <button class="select-all-btn" id="selectAllBtn">Seleccionar todas</button>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
      <div class="merge-button-container">
        <button class="delete-button" id="deleteButton" disabled>
          Eliminar Páginas Seleccionadas
        </button>
      </div>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/pdf-tools.js') }}?v=1.1"></script>
  <script src="{{ url_for('static', filename='js/eliminar.js') }}?v=1.1"></script>
</body>

</html>
