<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unir PDFs - PDF Tools</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>

<body>
  <header class="app-header">
    <div class="logo-container">
      <img src="{{ url_for('static', filename='images/flask-logo.svg') }}" alt="Flask" class="logo-icon">
      <img src="{{ url_for('static', filename='images/python-logo.svg') }}" alt="Python" class="logo-icon">
    </div>
  </header>

  <main class="main-container">
    <a href="/" class="back-link">← Volver al inicio</a>
    <h1 class="page-title">🔗 Unir PDFs</h1>

    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-icon">📄</div>
      <div class="drop-zone-text">Haz clic para seleccionar archivos PDF</div>
      <div class="drop-zone-subtext">O arrastra y suelta aquí · Puedes seleccionar múltiples archivos</div>
      <div class="drop-zone-steps">
        <span>1. Sube archivos</span><span> → </span><span>2. Ordénalos</span><span> → </span><span>3. Descarga</span>
      </div>
    </div>

    <input type="file" id="fileInput" class="file-input-hidden" accept="application/pdf" multiple>

    <div class="pdf-files-container" id="pdfFilesContainer"></div>

    <div class="merge-button-container">
      <button class="merge-button" id="mergeButton" disabled>
        Unir PDFs
      </button>
    </div>
  </main>

  <script src="{{ url_for('static', filename='js/pdf-tools.js') }}?v=1.1"></script>
  <script src="{{ url_for('static', filename='js/unir.js') }}?v=1.1"></script>
</body>

</html>
