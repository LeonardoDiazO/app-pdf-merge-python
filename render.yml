services:
  - type: web
    name: pdf-merger
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --max-requests 200 --max-requests-jitter 20"
    envVars:
      - key: FLASK_ENV
        value: production
